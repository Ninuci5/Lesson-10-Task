<body>
    <h1>Lesson 10</h1>
    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.
         Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. 
     </p>
     <form action="#">
        <div class="container">
            <label for="username">Username:</label>
            <input type="text" 
            name="username" 
            placeholder="Enter your username"
            id="username" 
            maxlength="5"
            minlenghth="1"
            required
            />
     </div>

     <div class="form-field">
        <label for="email">Email:</label>
        <input 
        type="email"
        name=" user email"
        placeholder="Example@example.com"
        id="email"
        required />
    </div>

    <div class="form-field">
        <label for="age">Age:</label>
        <input
            type="number"
            name="user age"
            placeholder="Enter your age"
            id="age"
            min="10"
            max="20"
            required />
    </div>
       <div class="form-field">
        <label for="password">Password:</label>
        <input
            type="password"
            name="user password"
            placeholder="Enter your password"
            id="password"
            min="10"
            max="20"
            required />
    </div>
     
     </div>

       <div class="form-field">
        <label for="avatar"
        >Avatar:
        <span></span>
        <input
            type="file"
            name="user avatar"
            placeholder="Upload your avatar"
            id="avatar"
            accept="pdf"
            required />
        </label>
    </div>

    <div class="form-field">
        <label for="birthday">Birthday:</label>
        <input
            type="date"
            name="user birthday"
            placeholder="Enter your birthday"
            id="birthday"
            required /> 
    </div>

    <div class="form-field">
        <label for="terms">
            <input
                type="checkbox"
                name="user terms"
                id="terms"
                required />
            I agree to the terms and conditions
        </label>
    </div>
    
     <div class="form-field">
        <label for="terms">
            <input
                type="checkbox"
                name="user terms"
                id="terms"
                required />
            I agree to the terms and conditions
        </label>
    </div>

    <div class="form-field">
        <label for="male">
            <input
                type="radio"    
                name ="gender"
                id="male">
            Male
        </label>
    </div>
     <div class="form-field">
        <label for="female">
            <input
                type="radio"    
                name ="gender"
                id="female">
            Female
        </label>
    </div>





        <button type="submit">Submit</button>   
    </form>

</body>
</html>
